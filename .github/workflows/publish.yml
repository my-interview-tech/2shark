name: Publish

on: workflow_dispatch

permissions:
  contents: write

concurrency: ${{ github.workflow }}

jobs:
  build:
    env:
      CI: true
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false

    steps:
      - name: Check permissions
        if: ${{ contains(fromJSON('["dHIM24"]'), github.actor) == false }}
        uses: actions/github-script@v6
        with:
          script: |
            core.setFailed("You don't have permission to run this workflow!");

      - uses: actions/checkout@v4
        with:
          ref: 'master'
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          registry-url: 'https://registry.npmjs.org/'
          always-auth: true
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build package
        run: npm run build

      - name: Check for changesets
        id: changesets
        run: |
          if ls .changeset/*.md 1> /dev/null 2>&1; then
            echo "has-changesets=true" >> $GITHUB_OUTPUT
            echo "Found changesets"
          else
            echo "has-changesets=false" >> $GITHUB_OUTPUT
            echo "No changesets found"
          fi

      - name: Version packages
        if: steps.changesets.outputs.has-changesets == 'true'
        run: npx changeset version

      - name: Get version
        id: get-version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Current version: $VERSION"

      - name: Commit and push changes
        env:
          HUSKY: 0
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add .
          git commit -m "chore: version bump and changelog update" || exit 0
          git push

      - name: Check NPM version
        id: npm-version
        run: |
          VERSION="${{ steps.get-version.outputs.version }}"
          if npm view "2shark@$VERSION" version --registry https://registry.npmjs.org/ > /dev/null 2>&1; then
            echo "published=true" >> $GITHUB_OUTPUT
            echo "2shark@$VERSION is already published"
          else
            echo "published=false" >> $GITHUB_OUTPUT
            echo "2shark@$VERSION is not published yet"
          fi

      - name: Publish to NPM
        if: steps.npm-version.outputs.published == 'false'
        run: npm publish --access public --registry https://registry.npmjs.org/
        env:
          NODE_AUTH_TOKEN: ${{ secrets.SHARP_NPM_PUBLISH_TOKEN }}

      - name: Create Git tag
        env:
          HUSKY: 0
        run: |
          VERSION="${{ steps.get-version.outputs.version }}"
          if git ls-remote --exit-code --tags origin "refs/tags/v$VERSION" > /dev/null 2>&1; then
            echo "Tag v$VERSION already exists"
          else
            git tag "v$VERSION"
            git push origin "v$VERSION"
          fi

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.get-version.outputs.version }}"
          if gh release view "v$VERSION" > /dev/null 2>&1; then
            echo "Release v$VERSION already exists"
          else
            gh release create "v$VERSION" \
              --title "Release v$VERSION" \
              --notes "$(cat <<'EOF'
            ## Changes in this Release

            Automated release from GitHub Actions.

            ### Installation

            ```bash
            npm install 2shark
            ```

            ### Usage

            ```typescript
            import { runImport, initDatabase } from '2shark';

            const result = await runImport({
              docsPath: './docs',
              configDir: './config',
              branch: 'main',
              commitSha: '<sha>'
            });
            ```
            
            ### Features

            - Built with esbuild for fast compilation
            - TypeScript definitions included
            - PostgreSQL database integration
            - CLI interface for easy usage
          EOF
          )"
          fi